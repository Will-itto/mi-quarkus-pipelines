name: Quarkus CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: ./mvnw verify -B
      - name: Build Docker image
        run: docker build -t mi-quarkus-pipelines:latest .
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to Docker Hub
        run: |
          docker tag mi-quarkus-pipelines:latest ${{ secrets.DOCKER_USERNAME }}/mi-quarkus-pipelines:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mi-quarkus-pipelines:latest